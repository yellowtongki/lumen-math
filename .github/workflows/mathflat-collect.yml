name: 매쓰플랫 야간 자동수집

# 매일 새벽(한국 04:00)에 매쓰플랫 정오답을 수집해 Supabase에 저장한다.
# - 컴퓨터를 켜둘 필요 없음(GitHub 서버에서 실행).
# - 필요한 비밀값(Repo Settings → Secrets and variables → Actions):
#     MATHFLAT_ID, MATHFLAT_PASSWORD, SUPABASE_URL, SUPABASE_SERVICE_KEY
# - 수동 실행: Actions 탭 → 이 워크플로 → "Run workflow" (기간 일수 지정 가능)

on:
  schedule:
    - cron: '0 19 * * *'    # UTC 19:00 = 한국시간(KST) 04:00 새벽
  workflow_dispatch:
    inputs:
      days:
        description: '수집 기간(최근 N일). 첫 실행은 크게(예: 60), 이후엔 7 권장'
        required: false
        default: '7'

concurrency:
  group: mathflat-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 매쓰플랫 수집 실행
        env:
          MATHFLAT_ID: ${{ secrets.MATHFLAT_ID }}
          MATHFLAT_PASSWORD: ${{ secrets.MATHFLAT_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node sync/mathflat_collector.js --days ${{ github.event.inputs.days || '7' }}
