<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2240;
  --navy2:#162e52;
  --navy3:#1e3d6e;
  --blue:#1d6fe8;
  --blue2:#3b84f7;
  --blue3:#dbeafe;
  --blue4:#eff6ff;
  --green:#059669;
  --green2:#ecfdf5;
  --green3:#a7f3d0;
  --red:#dc2626;
  --red2:#fef2f2;
  --red3:#fecaca;
  --purple:#7c3aed;
  --purple2:#f5f3ff;
  --amber:#d97706;
  --amber2:#fffbeb;
  --gold:#b5893a;
  --gold2:#fdf6e3;
  --bg:#eef2f8;
  --surface:#ffffff;
  --border:#e2e8f0;
  --border2:#cbd5e1;
  --text:#0f172a;
  --text2:#475569;
  --text3:#94a3b8;
  --r:12px;
  --rl:16px;
  --shadow:0 1px 4px rgba(15,34,64,0.06),0 4px 16px rgba(15,34,64,0.08);
  --shadow-hover:0 4px 12px rgba(15,34,64,0.1),0 12px 32px rgba(15,34,64,0.12);
  --shadow-card:0 1px 3px rgba(15,34,64,0.05),0 2px 8px rgba(15,34,64,0.06);
}
body{
  background:var(--bg);
  font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:16px;
}
.app{
  width:100%;
  max-width:560px;
  background:var(--surface);
  border-radius:20px;
  box-shadow:0 8px 40px rgba(13,34,64,0.14),0 2px 8px rgba(13,34,64,0.08);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:calc(100vh - 32px);
}
.hdr{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,var(--navy3) 100%);
  padding:14px 18px;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
.hdr::before{
  content:'';
  position:absolute;
  top:-30px;right:-20px;
  width:120px;height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.04);
  pointer-events:none;
}
.hdr::after{
  content:'';
  position:absolute;
  bottom:-40px;right:60px;
  width:80px;height:80px;
  border-radius:50%;
  background:rgba(255,255,255,0.03);
  pointer-events:none;
}
.content{flex:1;overflow-y:auto}
.nav{
  display:flex;
  border-top:1px solid var(--border);
  flex-shrink:0;
  background:white;
  padding:4px 6px;
  gap:2px;
}
.nb{
  flex:1;
  padding:8px 2px;
  border:none;
  cursor:pointer;
  background:transparent;
  color:var(--text3);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1px;
  font-size:9px;
  font-weight:700;
  font-family:inherit;
  border-radius:10px;
  transition:all 0.18s;
  letter-spacing:0.2px;
}
.nb.on{
  background:#eff6ff;
  color:var(--blue);
}
.nb:hover:not(.on){background:#f8fafc;color:var(--text2)}
.nb-icon{font-size:17px}

/* ── 데스크탑 2단 레이아웃 ── */
@media(min-width:900px){
  body{padding:20px;align-items:flex-start;height:100vh;overflow:hidden}
  .app{max-width:100%;flex-direction:row;height:calc(100vh - 40px);min-height:unset;border-radius:24px;overflow:hidden}
  /* 왼쪽: 좁은 사이드 메뉴 */

  /* 오른쪽: 넓은 콘텐츠 영역 */

<script>
/* ── 상수 ── */
// 날짜 정규화: 어떤 형식이든 yyyy.mm.dd 로 통일
// 학년 약식 변환: "초등학교 6학년" → "초6", "중학교 1학년" → "중1"
function gradeShort(g){
  if(!g)return'';
  return g.replace('초등학교','초').replace('중학교','중').replace('고등학교','고').replace(/\s/g,'').replace('학년','');
}

function normalizeDate(s){
  if(!s)return'';
  s=String(s).trim(); // 공백 제거
  // 이미 yyyy.mm.dd 형식
  if(/^\d{4}\.\d{2}\.\d{2}$/.test(s))return s;
  // yyyy-mm-dd 형식
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s.replace(/-/g,'.');
  // yyyy/mm/dd 형식
  if(/^\d{4}\/\d{2}\/\d{2}$/.test(s))return s.replace(/\//g,'.');
  // yyyy.m.d 또는 yyyy.mm.d 또는 yyyy.m.dd 형식
  if(/^\d{4}\.\d{1,2}\.\d{1,2}$/.test(s)){
    const p=s.split('.');
    return p[0]+'.'+p[1].padStart(2,'0')+'.'+p[2].padStart(2,'0');
  }
  // yyyy년 mm월 dd일 형식
  const kor=s.match(/^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일?$/);
  if(kor)return kor[1]+'.'+kor[2].padStart(2,'0')+'.'+kor[3].padStart(2,'0');
  return s;
}
const SS={풀이:{bg:'#dbeafe',text:'#1d4ed8',bar:'#3b82f6'},채점:{bg:'#fef9c3',text:'#92400e',bar:'#f59e0b'},오답:{bg:'#dcfce7',text:'#15803d',bar:'#22c55e'},아하노트:{bg:'#f3e8ff',text:'#7c3aed',bar:'#a855f7'},없음:{bg:'#f1f5f9',text:'#94a3b8',bar:'#e2e8f0'}};
const PS={100:{bg:'#dcfce7',text:'#15803d'},60:{bg:'#fef9c3',text:'#92400e'},30:{bg:'#dbeafe',text:'#1d4ed8'},0:{bg:'#f1f5f9',text:'#94a3b8'}};
const STAGES=['없음','풀이','채점','오답','아하노트'];
const PCTS=[0,30,60,100];
const GRADE_NAMES=["초등학교 4학년","초등학교 5학년","초등학교 6학년","중학교 1학년","중학교 2학년","중학교 3학년","고등학교 1학년","고등학교 2학년","고등학교 3학년"];
const HW_GUIDE={풀이:'문제를 처음 스스로 풀어보는 단계예요.',채점:'풀이 후 정답을 확인하고 맞고 틀림을 표시하는 단계예요.',오답:'틀린 문제를 다시 풀어보는 가장 중요한 단계예요! ⭐',아하노트:'틀린 이유를 스스로 정리하는 단계예요. 완성하면 실력이 크게 늘어요.'};

const DEFAULT_PROMPT=`학생의 수학 진단 결과를 바탕으로 학부모에게 전달하는 따뜻하고 전문적인 피드백을 작성해주세요.

[작성 조건]
- 3~5문장으로 간결하게

function saveBookField(id, field, val){
  const idx = books.findIndex(b=>b.id===id);
  if(idx<0) return;
  books[idx][field] = val;
  saveBooks();
}

function saveBookLevel(id, lv, val){
  const idx = books.findIndex(b=>b.id===id);
  if(idx<0) return;
  if(!books[idx].level) books[idx].level = {};
  books[idx].level[lv] = { pagesPerClass: val };
  saveBooks();
  // 완료일 미리보기 업데이트
  const el = document.getElementById('book-weeks-' + id + '-' + lv);
  if(el){
    const total = parseInt(books[idx].totalPages)||0;
    const ppc = parseInt(val)||0;
    el.textContent = (total>0&&ppc>0) ? '~'+Math.ceil(Math.ceil(total/ppc)/2)+'주' : '';
  }
}

function convertGradeToFull(g){
  const map = {
    '초4':'초등 4학년','초5':'초등 5학년','초6':'초등 6학년',
    '중1':'중학교 1학년','중2':'중학교 2학년','중3':'중학교 3학년',
    '고1':'고등학교 1학년','고2':'고등학교 2학년','고3':'고등학교 3학년',
    '초1':'초등학교 1학년','초2':'초등학교 2학년','초3':'초등학교 3학년',
    '초4':'초등학교 4학년','초5':'초등학교 5학년','초6':'초등학교 6학년'
  };
  return map[g] || g;
}

function migrateLumenData(){
  const lumenStudents = JSON.parse(localStorage.getItem('lumen_students') || '[]');
  if(!lumenStudents.length) return;
  let merged=0, added=0;
  lumenStudents.forEach(ls=>{
    const grade = convertGradeToFull(ls.grade);
    const existing = students.find(s=>s.name===ls.name && s.grade===grade);
    const lumenFields = {
      lumen_targetUniversity:  ls.targetUniversity  || '',
      lumen_targetMajor:       ls.targetMajor       || '',
      lumen_classDaysPerWeek:  ls.classDaysPerWeek  || 2,
      lumen_studentLevel:      ls.studentLevel      || '중',
      lumen_assignedBooks:     ls.assignedBooks     || [],
      lumen_materialProgress:  ls.materialProgress  || {},
      lumen_homeworkCheck:     ls.homeworkCheck     || {},
      lumen_weeklyScores:      ls.weeklyScores      || [],
      lumen_attitude:          ls.attitude          || {},
      lumen_roadmap:           ls.roadmap           || {},
    };
    if(existing){
      Object.assign(existing, lumenFields);
      merged++;
    } else {
      students.push(migrateStudentLumen(migrateStudentDb({
        name: ls.name, grade, group: '',
        createdAt: new Date().toISOString().slice(0,10),
        ...lumenFields
      })));
      added++;
    }
  });
  // lumen_books → or_books (기존 없을 때만)
  if(!books.length){
    const lb = JSON.parse(localStorage.getItem('lumen_books') || '[]');
    if(lb.length){ books = lb; saveBooks(); }
  }
  saveStudents();
  localStorage.removeItem('lumen_students');
  if(merged+added > 0){
    setTimeout(()=>{
      const b = document.createElement('div');
      b.style.cssText = 'position:fixed;top:60px;right:16px;background:#059669;color:white;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(5,150,105,0.4)';
      b.textContent = '✅ lumen 데이터 통합 완료 (' + (merged+added) + '명)';
      document.body.appendChild(b);
      setTimeout(()=>b.remove(), 3500);
    }, 600);
  }
}
migrateLumenData();

function toggleStudentBook(stId, bookId, bookType){
  const st = students.find(s=>s.id===stId);
  if(!st) return;
  const ab = st.lumen_assignedBooks || [];
  const has = ab.find(b=>b.bookId===bookId);
  if(has){
    st.lumen_assignedBooks = ab.filter(b=>b.bookId!==bookId);
  } else {
    st.lumen_assignedBooks = [...ab, {
      bookId, type: bookType,
      startDate: new Date().toISOString().slice(0,10).replace(/-/g,'.')
    }];
  }
  saveStudents();
  render();
}

// ── 진도 계산 헬퍼 ───────────────────────────────
function calcFinishDate(startDate, totalPages, ppc, cpw){
  if(!totalPages||!ppc||!cpw) return null;
  const classes = Math.ceil(parseInt(totalPages)/ppc);
  const weeks = Math.floor(classes/cpw);
  const extra = Math.ceil((classes%cpw) * (7/cpw));
  const d = new Date((startDate||'').replace(/\./g,'-') || new Date());
  d.setDate(d.getDate() + weeks*7 + extra);
  return d.toISOString().slice(0,10).replace(/-/g,'.');
}

        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${GRADES_ALL.map(g=>`
            <button onclick="CUR_DEPLOY_GRADE='${g}';render()"

          <div style="font-size:12px;font-weight:700;color:#15803d;margin-bottom:6px">✅ 적용될 내용 미리보기</div>

          <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">

            );

          }).join('')}

          var cr = curricula.find(c=>c.id===CUR_DEPLOY_CURR);
          if(!cr){alert('커리큘럼을 선택해주세요');return;}
          var rd = cr.grades[CUR_DEPLOY_GRADE]||{current:[],advanced:[]};

            var st = students.find(s=>s.id===chk.dataset.stid);
            if(!st)return;
            if(st.lumen_roadmap && Object.values(st.lumen_roadmap).some(function(g){return (g.current||[]).some(function(b){return b.trim();});})){
              hasExisting.push(st.name);
            }
          });

          var doApply = function(overwrite){
            chks.forEach(function(chk){
              var st = students.find(s=>s.id===chk.dataset.stid);
              if(!st)return;
              var hasRd = st.lumen_roadmap && Object.values(st.lumen_roadmap).some(function(g){return (g.current||[]).some(function(b){return b.trim();});});
              if(hasRd && !overwrite) return;
              if(!st.lumen_roadmap) st.lumen_roadmap={};
              if(!st.lumen_roadmap[CUR_DEPLOY_GRADE]) st.lumen_roadmap[CUR_DEPLOY_GRADE]={current:[],advanced:[]};
              st.lumen_roadmap[CUR_DEPLOY_GRADE].current = [...(rd.current||[])];
              st.lumen_roadmap[CUR_DEPLOY_GRADE].advanced = [...(rd.advanced||[])];
            });
            saveStudents();
            alert('✅ 배포 완료!');
            render();
          };

          if(hasExisting.length){
            var msg = hasExisting.join(', ')+'\\n\\n이 학생들은 이미 로드맵이 있어요.\\n덮어쓸까요?\\n\\n[확인] 덮어쓰기  [취소] 건너뛰기';
            if(confirm(msg)){
              doApply(true);
            } else {
              doApply(false);
            }
          } else {
            doApply(true);
          }
        })()"

          📤 선택한 학생에게 배포하기
        </button>`;
      }
    }
  }

  h += `</div>`;
  return h;
}

            <div style="font-size:10px;color:#94a3b8;margin-bottom:4px;font-weight:600">총 페이지</div>
            <div style="display:flex;align-items:center;gap:4px">

                style="flex:1;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px;text-align:center;font-size:14px;font-weight:700;color:#0d2240;font-family:inherit;outline:none">
              <span style="font-size:12px;color:#94a3b8">p</span>

            }).join('') : '<span style="font-size:11px;color:#94a3b8">등록된 학생이 없어요</span>'}
          </div>
        </div>
      </div>
    </div>`;
  });

  return h + '</div>';
}

// ── 상태 ─────────────────────────────────────────
let QUICK_DATE = new Date().toISOString().slice(0,10).replace(/-/g,'.');
let QUICK_GROUP = ''; // 선택된 반 ('' = 전체)
let QUICK_TAB = '진도'; // 빠른 입력 탭: 진도 | 과제 | 숙제
let HW_DATE = new Date().toISOString().slice(0,10).replace(/-/g,'.'); // 숙제 체크 전용 날짜
let HW_GROUP = ''; // 숙제 체크 전용 반
let QUICK_SAVED = false;

const HW_STAGES = ['풀이','채점','오답','아하노트'];
const HW_PCTS   = [0, 30, 60, 100];
const HW_COLORS = {
  '풀이':   {bg:'#dbeafe', text:'#1d4ed8', bar:'#3b82f6'},
  '채점':   {bg:'#fef9c3', text:'#92400e', bar:'#f59e0b'},
  '오답':   {bg:'#dcfce7', text:'#15803d', bar:'#22c55e'},
  '아하노트':{bg:'#f3e8ff', text:'#7c3aed', bar:'#a855f7'},
  '없음':   {bg:'#f1f5f9', text:'#94a3b8', bar:'#e2e8f0'},
};

// ── 데이터 저장 헬퍼 ─────────────────────────────
function getHwData(stId, bookId){
  const st = students.find(s=>s.id===stId);
  if(!st) return {stage:'없음', pct:0};
  const d = (st.lumen_homeworkCheck||{})[QUICK_DATE]?.[bookId];
  return d || {stage:'없음', pct:0};
}

function saveHwStage(stId, bookId, stage){
  const st = students.find(s=>s.id===stId);
  if(!st) return;
  if(!st.lumen_homeworkCheck) st.lumen_homeworkCheck = {};
  if(!st.lumen_homeworkCheck[QUICK_DATE]) st.lumen_homeworkCheck[QUICK_DATE] = {};
  if(!st.lumen_homeworkCheck[QUICK_DATE][bookId]) st.lumen_homeworkCheck[QUICK_DATE][bookId] = {stage:'없음',pct:0};
  st.lumen_homeworkCheck[QUICK_DATE][bookId].stage = stage;
  saveStudents();
  const bar = document.getElementById('hw-bar-'+stId+'-'+bookId);
  const col = HW_COLORS[stage]||HW_COLORS['없음'];
  if(bar) bar.style.background = col.bar;
  HW_STAGES.forEach(s=>{
    const btn = document.getElementById('hw-stage-'+stId+'-'+bookId+'-'+s);
    if(btn){
      const on = s===stage;
      btn.style.background = on ? col.bg : '#f8fafc';
      btn.style.color = on ? col.text : '#94a3b8';
      btn.style.borderColor = on ? col.bar : '#e2e8f0';
      btn.style.fontWeight = on ? '800' : '600';
    }
  });
}

// 과제별 독립 키 버전 (교재과제키: bookId_asgnId, 프린트: print_asgnId)
function saveHwStageKey(stId, hwKey, stage, date){
  const st=students.find(s=>s.id===stId);
  if(!st)return;
  if(!st.lumen_homeworkCheck)st.lumen_homeworkCheck={};
  if(!st.lumen_homeworkCheck[date])st.lumen_homeworkCheck[date]={};
  if(!st.lumen_homeworkCheck[date][hwKey])st.lumen_homeworkCheck[date][hwKey]={stage:'없음',pct:0};
  st.lumen_homeworkCheck[date][hwKey].stage=stage;
  saveStudents();
  const col=HW_COLORS[stage]||HW_COLORS['없음'];
  const bar=document.getElementById('hck-bar-'+stId+'-'+hwKey);
  if(bar){bar.style.background=col.bar;}
  HW_STAGES.forEach(s=>{
    const btn=document.getElementById('hck-stage-'+stId+'-'+hwKey+'-'+s);
    if(btn){const on=s===stage;btn.style.background=on?col.bg:'white';btn.style.color=on?col.text:'#94a3b8';btn.style.borderColor=on?col.bar:'#e2e8f0';btn.style.fontWeight=on?'800':'600';}
  });
  // pct 표시 업데이트
  const pctEl=document.getElementById('hck-pct-'+stId+'-'+hwKey);
  if(pctEl){pctEl.style.color=col.text||'#94a3b8';}
}

function saveHwPctKey(stId, hwKey, pct, date){
  const st=students.find(s=>s.id===stId);
  if(!st)return;
  if(!st.lumen_homeworkCheck)st.lumen_homeworkCheck={};
  if(!st.lumen_homeworkCheck[date])st.lumen_homeworkCheck[date]={};
  if(!st.lumen_homeworkCheck[date][hwKey])st.lumen_homeworkCheck[date][hwKey]={stage:'없음',pct:0};
  const n=parseInt(pct)||0;
  st.lumen_homeworkCheck[date][hwKey].pct=n;
  saveStudents();
  const bar=document.getElementById('hck-bar-'+stId+'-'+hwKey);
  if(bar)bar.style.width=n+'%';
  const label=document.getElementById('hck-pct-'+stId+'-'+hwKey);
  if(label)label.textContent=n+'%';
  const stage=(st.lumen_homeworkCheck[date][hwKey].stage)||'없음';
  const col=HW_COLORS[stage]||HW_COLORS['없음'];
  HW_PCTS.forEach(p=>{
    const btn=document.getElementById('hck-pct-'+stId+'-'+hwKey+'-'+p);
    if(btn){const on=p===n;btn.style.background=on?col.bg:'white';btn.style.color=on?col.text:'#94a3b8';btn.style.borderColor=on?col.bar:'#e2e8f0';}
  });
}

// 날짜 인자 버전 (숙제 체크 모드용)
function saveHwStageD(stId, bookId, stage, date){
  const st = students.find(s=>s.id===stId);
  if(!st) return;
  if(!st.lumen_homeworkCheck) st.lumen_homeworkCheck = {};

function saveCurrentPage(stId, bookId, val){
  const st = students.find(s=>s.id===stId);
  if(!st) return;
  if(!st.lumen_materialProgress) st.lumen_materialProgress = {};
  const mp = st.lumen_materialProgress[bookId] || {currentPage:0, history:[]};
  const num = parseInt(val)||0;
  const hist = (mp.history||[]).filter(h=>h.date!==QUICK_DATE);
  st.lumen_materialProgress[bookId] = {
    currentPage: num,
    history: [...hist, {date:QUICK_DATE, page:num}].sort((a,b)=>a.date.localeCompare(b.date))
  };
  saveStudents();
  // 진도바 업데이트
  const book = books.find(b=>b.id===bookId);
  if(book && parseInt(book.totalPages)>0){
    const pct = Math.min(100, Math.round((num/parseInt(book.totalPages))*100));
    const progBar = document.getElementById('prog-bar-'+stId+'-'+bookId);
    const progLabel = document.getElementById('prog-label-'+stId+'-'+bookId);
    if(progBar) progBar.style.width = pct+'%';
    if(progLabel) progLabel.textContent = pct+'%';
  }
}

function migrateStudent(s){
  if(!s)return s;
  // showRank 기본값
  if(s.showRank===undefined||s.showRank===null)s.showRank=true;
  // testType 보정 - 전국 등수 있으면 weekly
  if(!s.testType){s.testType=(s.rank&&s.total)?'weekly':'class';}
  // 배열 필드 보정
  if(!Array.isArray(s.units))s.units=[{name:'',student:'',avg:''},{name:'',student:'',avg:''}];
  if(!Array.isArray(s.behaviors))s.behaviors=[
    {name:'문제해결역량',score:'',grade:'',desc:'수학 개념을 문제 상황에 적절히 활용'},
    {name:'추론역량',score:'',grade:'',desc:'논리적으로 절차를 수행하는 능력'},
    {name:'의사소통역량',score:'',grade:'',desc:'수학적 표현을 이해하고 정확하게 사용'},
    {name:'연결역량',score:'',grade:'',desc:'개념·원리·법칙을 관련지어 이해'},
    {name:'정보처리역량',score:'',grade:'',desc:'자료와 정보를 목적에 맞게 수집·정리'},
  ];
  if(!Array.isArray(s.strong))s.strong=[{num:'',topic:'',sub:''},{num:'',topic:'',sub:''},{num:'',topic:'',sub:''}];
  if(!Array.isArray(s.weak))s.weak=[{num:'',topic:'',sub:''},{num:'',topic:'',sub:''}];
  if(!Array.isArray(s.items))s.items=Array.from({length:20},(_,i)=>({n:i+1,name:'',score:'',correct:true}));
  // homework 보정
  if(!s.homework||typeof s.homework!=='object')s.homework={show:true,rows:[{date:'날짜',stage:'없음',pct:0}]};
  if(s.homework.show===undefined)s.homework.show=true;
  if(!Array.isArray(s.homework.rows))s.homework.rows=[{date:'날짜',stage:'없음',pct:0}];
  // 기본 필드 보정
  if(!s.name)s.name='';
  if(s.targetScore===undefined)s.targetScore='';
  if(s.group===undefined)s.group='';
  if(s.teacherMemo===undefined)s.teacherMemo='';
  if(!s.grade)s.grade='중학교 1학년';
  if(!s.date)s.date=new Date().toISOString().slice(0,10).replace(/-/g,'.');
  else s.date=normalizeDate(s.date); // 날짜 형식 통일
  if(s.studentId===undefined)s.studentId=''; // 등록부 학생ID 연결
  return s;
}

      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiKey}`,
      {method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
         generationConfig:{maxOutputTokens:2000,temperature:0.7}})}
    );
    const j=await resp.json();
    if(!resp.ok||j.error)throw new Error(j.error?.message||'Gemini API 오류: HTTP '+resp.status);
    return j.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }else{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:prompt}]})
    });
    const j=await resp.json();
    if(!resp.ok||j.error)throw new Error(j.error?.message||'Claude API 오류: HTTP '+resp.status);
    return j.content?.[0]?.text||'';
  }
}

/* ── PDF 처리 ── */
async function onFileChange(input){
  if(!apiKey&&!geminiKey){alert('먼저 API 키를 등록해주세요!\n\n⚙️ 설정 탭에서 등록하거나\n상단 노란 배너에서 입력하세요.');return;}
  const files=Array.from(input.files||[]).filter(f=>f.type.includes('pdf'));
  if(!files.length)return;
  files.forEach(f=>pdfStatus.push({name:f.name,st:'wait',err:''}));
  pdfQueue.push(...files);
  VIEW='analyzing';
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  render();
  if(!pdfProcessing)runQueue();
}

async function runQueue(){
  if(!pdfQueue.length){pdfProcessing=false;render();return;}
  pdfProcessing=true;
  const file=pdfQueue.shift();
  const qi=pdfStatus.findIndex(q=>q.st==='wait');
  if(qi>=0)pdfStatus[qi].st='proc';
  render();
  try{
    if(typeof pdfjsLib==='undefined'||!pdfjsLib.getDocument)throw new Error('PDF 분석 기능 로딩 중입니다. 잠시 후 다시 시도해주세요.');
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let text='';
    for(let i=1;i<=Math.min(pdf.numPages,8);i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(it=>it.str).join(' ')+'\n';
    }
    text=text.trim();
    // PDF에서 추출된 제어문자(SOH 등) 제거 및 텍스트 정규화
    text=text.replace(/[\u0000-\u0008\u000b\u000c\u000e-\u001f]/g,' ') // 제어문자 제거 (탭/줄바꿈 제외)
             .replace(/ +/g,' ')  // 연속 공백 정리
             .trim();
    if(!text||text.length<20)throw new Error('텍스트 없음 (이미지형 PDF)');
    const d=await callAPI(text,file.name);
    // items 정규화: n/score 타입 보정, 필드명 변형 대응
    if(Array.isArray(d.items)){
      d.items=d.items.map((it,i)=>{
        const n=parseInt(it.n||it.num||it.number||i+1)||i+1;
        const scoreRaw=it.score??it.correctRate??it.rate??it.percentage??'';
        const score=parseFloat(String(scoreRaw).replace('%','').trim());
        const name=it.name||it.topic||it.title||'';
        const correct=it.correct!==undefined?!!it.correct:(score>=70);
        return {n,name,score:isNaN(score)?0:score,correct};
      });
    }
    // units 정규화
    if(Array.isArray(d.units)){
      d.units=d.units.map(u=>({
        name:String(u.name||u.unit||u.topic||'').replace(/^(중|고|초)\d\s*/,''),
        student:parseFloat(String(u.student??u.studentRate??u.score??0).replace('%','')),
        avg:parseFloat(String(u.avg??u.average??u.national??0).replace('%',''))
      }));
    }
    // behaviors 정규화
    if(Array.isArray(d.behaviors)){
      d.behaviors=d.behaviors.map(b=>({
        name:b.name||'',
        score:parseFloat(String(b.score??b.achievement??0).replace('%','')),
        grade:parseInt(b.grade||b.level||0)||0,
        desc:b.desc||''
      }));
    }
    d.date=normalizeDate(d.date); // 저장 시 날짜 형식 통일
    // ★ 파일명에서 시험 과정(testGrade) 추출: _중1_, _초6_ 형태
    const gradeMatch=file.name.match(/[_\s](초\d|중\d|고\d)[_\s\.\(]/);
    if(gradeMatch){
      const raw=gradeMatch[1];
      const gradeMap={'초1':'초등학교 1학년','초2':'초등학교 2학년','초3':'초등학교 3학년','초4':'초등학교 4학년','초5':'초등학교 5학년','초6':'초등학교 6학년','중1':'중학교 1학년','중2':'중학교 2학년','중3':'중학교 3학년','고1':'고등학교 1학년','고2':'고등학교 2학년','고3':'고등학교 3학년'};
      d.testGrade=gradeMap[raw]||raw;
    }
    // ★ 등록부에 같은 이름 학생이 있으면 등록부 학년 우선 사용 (이름만으로 매칭)
    if(d.name){
      const stMatch=students.find(s=>s.name===d.name);
      if(stMatch&&stMatch.grade){
        d.grade=stMatch.grade;
        d.studentId=stMatch.id;
      }
    }
    d.id='r_'+Date.now();d.savedAt=new Date().toISOString();d._shareId=null;d.comment=d.comment||'';
    if(!d.homework)d.homework={show:true,rows:[{date:'날짜',stage:'없음',pct:0}]};
    list.unshift(d);saveList();
    if(qi>=0)pdfStatus[qi].st='done';
    render();
    autoFeedback(d);
  }catch(e){
    if(qi>=0){pdfStatus[qi].st='err';pdfStatus[qi].err=String(e.message||e).slice(0,80);}
    render();
  }
  await new Promise(r=>setTimeout(r,600));
  runQueue();
}

async function callAPI(text,filename){
  // 텍스트 전처리: JSON을 깨는 특수문자 치환
  text=text
    .replace(/[\u0000-\u0008\u000b\u000c\u000e-\u001f\u007f]/g,' ')
    .replace(/\u00f7/g,'/').replace(/\u00d7/g,'x')
    .replace(/\u25a1/g,'').replace(/\u25a0/g,'')
    .replace(/\u2264/g,'<=').replace(/\u2265/g,'>=').replace(/\u2260/g,'!=')
    .replace(/\u2192/g,'->').replace(/\u2026/g,'...')
    .replace(/\u00b7/g,' ')  // 가운데점(·) 제거
    .replace(/\n/g,' ')      // 줄바꿈을 공백으로 (AI가 name 필드에 \n 삽입 방지)
    .replace(/"/g,"'").replace(/ +/g,' ').trim();

  const pdfPrompt='루멘수학 ONE REPORT PDF 텍스트입니다. 아래 JSON 형식으로만 응답. 마크다운 없이 순수 JSON만.\n'
    +'\nname 필드 규칙: 특수문자(나눗셈기호,사각형,부등호 등) 없이 한글/숫자/영문/공백만 사용\n'
    +'date: PDF 첫줄 날짜 사용, 형식 YYYY.MM.DD\n'
    +'testType: 전국 인원수나 등수 있으면 "weekly", 없으면 "class"\n'
    +'\n파일명: '+filename+'\n텍스트:\n'+text.slice(0,4000)+'\n\n'
    +'출력:\n{"name":"","grade":"중학교 2학년","date":"","score":0,"level":0,"rank":null,"total":null,"avgScore":null,"comment":"","bookname":"","showRank":true,"testType":"class",'
    +'"units":[{"name":"","student":0,"avg":0}],'
    +'"behaviors":[{"name":"문제해결역량","score":0,"grade":0,"desc":"수학 개념을 문제 상황에 적절히 활용"},{"name":"추론역량","score":0,"grade":0,"desc":"논리적으로 절차를 수행하는 능력"},{"name":"의사소통역량","score":0,"grade":0,"desc":"수학적 표현을 이해하고 정확하게 사용"},{"name":"연결역량","score":0,"grade":0,"desc":"개념 원리 법칙을 관련지어 이해"},{"name":"정보처리역량","score":0,"grade":0,"desc":"자료와 정보를 목적에 맞게 수집 정리"}],'
    +'"strong":[{"num":0,"topic":"","sub":""}],"weak":[{"num":0,"topic":"","sub":""}],'
    +'"items":[{"n":1,"name":"","score":0,"correct":true}],'
    +'"homework":{"show":true,"rows":[{"date":"날짜","stage":"없음","pct":0}]}}';
  const txt=await callAI(pdfPrompt);
  // JSON 정제 후 파싱
  let raw=txt.replace(/```json|```/g,'').trim();
  const js=raw.indexOf('{'),je=raw.lastIndexOf('}');
  if(js>=0&&je>js)raw=raw.slice(js,je+1);
  // 1차: 세미콜론만 교체해서 시도
  let c1=raw.replace(/;/g,',');
  try{return JSON.parse(c1);}catch(ex1){}
  // 2차: 문자열 내 줄바꿈 제거 후 시도  
  let c2='',inQ=false;
  for(let i=0;i<c1.length;i++){
    const ch=c1[i],prev=i>0?c1[i-1]:'';
    if(ch==='"'&&prev!=='\\')inQ=!inQ;
    if(inQ&&(ch==='\n'||ch==='\r'))c2+=' ';
    else c2+=ch;
  }
  try{return JSON.parse(c2);}catch(ex2){}
  // 3차: 이상한 이스케이프 제거
  let c3=c2.replace(/\\([^"\\\/bfnrtu])/g,'$1');
  try{return JSON.parse(c3);}catch(ex3){}
  // 4차: JSON 문자열 값 안의 특수문자 이스케이프 처리
  // ÷ □ ≤ ≥ ≠ ∞ 등 수학 특수문자가 JSON을 깨는 경우
  let c4=c3.replace(/"([^"]*)"/g,function(_,inner){
    return '"'+inner
      .replace(/\\/g,'\\\\')
      .replace(/\t/g,' ')
      .replace(/[\u0000-\u001f]/g,' ')
    +'"';
  });
  try{return JSON.parse(c4);}catch(ex4){}
  // 5차: name 필드 특수문자 제거
  let c5=c4.replace(/"name"\s*:\s*"([^"]*)"/g,function(_,v){
    return '"name":"'+v.replace(/[÷×□≤≥≠∞→←↑↓△▽○●■□·]/g,'').replace(/[\u0000-\u001f]/g,' ').trim()+'"';
  });
  try{return JSON.parse(c5);}catch(ex5){}
  // 6차: 모든 문자열 값 내부 문제 문자 일괄 제거
  let c6=c5.replace(/"((?:[^"\\]|\\.)*)"/g,function(m,inner){
    const cleaned=inner.replace(/[\u0000-\u001f\u00b7÷×□■≤≥≠∞→←↑↓△▽]/g,' ').replace(/ +/g,' ').trim();
    return '"'+cleaned+'"';
  });
  try{return JSON.parse(c6);}catch(ex6){}
  // 최후 수단: 핵심 필드만 정규식으로 추출해서 최소 객체 반환
  const exName=raw.match(/"name"\s*:\s*"([^"]{1,20})"/)
  const exScore=raw.match(/"score"\s*:\s*(\d+)/);
  const exLevel=raw.match(/"level"\s*:\s*(\d+)/);
  const exDate=raw.match(/"date"\s*:\s*"([^"]{6,12})"/);
  const exGrade=raw.match(/"grade"\s*:\s*"([^"]{4,20})"/);
  const exType=raw.match(/"testType"\s*:\s*"(weekly|class)"/);
  return {
    name:exName?exName[1]:'',grade:exGrade?exGrade[1]:'',
    date:exDate?exDate[1]:'',score:exScore?Number(exScore[1]):0,
    level:exLevel?Number(exLevel[1]):0,rank:null,total:null,avgScore:null,
    comment:'',bookname:'',showRank:true,testType:exType?exType[1]:'class',
    units:[],behaviors:[],strong:[],weak:[],items:[],
    homework:{show:true,rows:[{date:'날짜',stage:'없음',pct:0}]}
  };
}

async function autoFeedback(d){
  if((!apiKey&&!geminiKey)||!d.name)return;
  fbLoading=true;if(FT==='comment')render();
  try{
    const strong=(d.strong||[]).filter(s=>s.topic).map(s=>s.topic).join(', ')||'없음';
    const weak=(d.weak||[]).filter(w=>w.topic).map(w=>w.topic).join(', ')||'없음';
    const behaviors=(d.behaviors||[]).filter(b=>b.score).map(b=>`${b.name}(${b.score}%,${b.grade}등급)`).join(', ');
    let filled=promptText
      .replace(/\{name\}/g,d.name).replace(/\{grade\}/g,d.grade)
      .replace(/\{score\}/g,d.score).replace(/\{level\}/g,d.level)
      .replace(/\{strong\}/g,strong).replace(/\{weak\}/g,weak)
      .replace(/\{behaviors\}/g,behaviors);
    const hasVars=promptText.includes('{name}')||promptText.includes('{score}');
    if(!hasVars){
      filled+=`\n\n[학생 정보]\n이름: ${d.name} / 학년: ${d.grade}\n점수: ${d.score}점 / 등급: ${d.level}등급\n우수유형: ${strong}\n취약유형: ${weak}\n역량: ${behaviors}`;
    }
    let txt=await callAI(filled);
    txt=txt.replace(/^\[.*?\]\s*/,'');
    txt=txt.replace(/^안녕하세요[^.]*\.\s*/,'');
    txt=txt.replace(/^테스트점수:\s*\d+점\s*/m,'');
    txt=txt.replace(/^\s*\n/gm,'').trim();
    d.comment=txt;
    const idx=list.findIndex(s=>s.id===d.id);
    if(idx>=0){list[idx]=d;saveList();}
    if(VIEW==='list'||VIEW==='form')render();
  }catch{}
  fbLoading=false;
}

  if(existing){existing.remove();if(existing.dataset.id===id)return;}

  const curDate=(r.date||'').replace(/\./g,'-');

  const pop=document.createElement('div');
  pop.id='bulk-date-popover';
  pop.dataset.id=id;
  pop.style.cssText='position:fixed;z-index:9999;background:white;border:1.5px solid #bfdbfe;border-radius:12px;padding:12px;box-shadow:0 8px 24px rgba(13,34,64,0.18);min-width:220px';

  pop.innerHTML=`
    <div style="font-size:12px;font-weight:700;color:#0d2240;margin-bottom:8px">📅 날짜 변경</div>
    <input type="date" id="pop-date-inp" value="${curDate}"
      style="width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px">
    <div style="display:flex;gap:6px">
      <button onclick="bulkDateApply('${id}')" style="flex:1;padding:8px;background:linear-gradient(135deg,#0d2240,#1d6fe8);color:white;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">변경</button>
      <button onclick="document.getElementById('bulk-date-popover')?.remove()" style="padding:8px 14px;border:1.5px solid #e2e8f0;border-radius:8px;background:white;font-size:13px;cursor:pointer;font-family:inherit;color:#64748b">취소</button>
    </div>`;

  // 버튼 위치 기준으로 팝오버 위치 설정
  const rect=btn.getBoundingClientRect();

function bulkDateApply(id){

async function genFeedbackForStudent(r){
  const strong=(r.strong||[]).filter(s=>s.topic).map(s=>s.topic).join(', ')||'없음';
  const weak=(r.weak||[]).filter(w=>w.topic).map(w=>w.topic).join(', ')||'없음';
  const behaviors=(r.behaviors||[]).filter(b=>b.score).map(b=>`${b.name}(${b.score}%,${b.grade}등급)`).join(', ');
  const hwRows=(r.homework?.rows||[]).filter(row=>row.stage!=='없음');
  const hwSummary=hwRows.length?hwRows.map(row=>row.date+' '+row.stage+' '+row.pct+'%').join(', '):'없음';
  let filled=promptText
    .replace(/\{name\}/g,r.name).replace(/\{grade\}/g,r.grade)
    .replace(/\{score\}/g,r.score).replace(/\{level\}/g,r.level)
    .replace(/\{strong\}/g,strong).replace(/\{weak\}/g,weak)
    .replace(/\{behaviors\}/g,behaviors);
  const hasVars=promptText.includes('{name}')||promptText.includes('{score}');
  if(!hasVars){
    filled+=`\n\n[학생 정보]\n이름: ${r.name} / 학년: ${r.grade}\n점수: ${r.score}점 / 등급: ${r.level}등급\n목표점수: ${r.targetScore||'미설정'}\n우수유형: ${strong}\n취약유형: ${weak}\n역량: ${behaviors||'없음'}\n숙제완성도: ${hwSummary}`;
  }
  const memo=bulkMemos[r.id]||'';
  if(memo.trim()){
    filled+=`\n\n[선생님 특별 메모 - 아래 내용을 피드백에 자연스럽게 녹여서 작성해주세요]\n${memo.trim()}`;
  }
  let txt=await callAI(filled);
  txt=txt.replace(/^\[.*?\]\s*/,'').replace(/^안녕하세요[^.]*\.\s*/,'').replace(/^\s*\n/gm,'').trim();
  return txt;
}

async function runBulkFeedback(targets){
  if(!apiKey&&!geminiKey){alert('API 키를 먼저 등록해주세요 (설정 탭)');return;}
  const selected=(targets||[]).filter(r=>bulkChecks[r.id]!==false&&(bulkChecks[r.id]===true||!r.comment));
  if(!selected.length){alert('선택된 학생이 없습니다');return;}
  bulkLoading=true;
  bulkProgress={total:selected.length,done:0,current:''};
  render();
  for(const r of selected){
    bulkResults[r.id]='loading';
    bulkProgress.current=r.name;
    render();
    try{
      const txt=await genFeedbackForStudent(r);
      const idx=list.findIndex(s=>s.id===r.id);
      if(idx>=0){list[idx].comment=txt;}
      bulkResults[r.id]='done';
    }catch(e){
      bulkResults[r.id]='err';
      console.error('피드백 생성 실패:',r.name,e.message);
    }
    bulkProgress.done++;
    render();
    await new Promise(res=>setTimeout(res,400));
  }
  bulkLoading=false;
  bulkProgress={total:0,done:0,current:''};
  render();
}

function bulkSaveComment(id, txt){

}

function bulkChangeDate(){
  const inp=document.getElementById('bulk-date-inp');
  if(!inp||!inp.value){alert('날짜를 선택해주세요');return;}
  const newDate=inp.value.replace(/-/g,'.');
  // 체크된 학생 직접 계산
  const selected=list.filter(r=>bulkChecks[r.id]===true||(bulkChecks[r.id]!==false&&!r.comment));
  if(!selected.length){alert('체크된 학생이 없습니다');return;}
  selected.forEach(r=>{
    const idx=list.findIndex(s=>s.id===r.id);
    if(idx>=0)list[idx].date=newDate;
    if(form.id===r.id)form.date=newDate;
  });
  saveList();
  alert('✅ '+selected.length+'명의 날짜를 '+newDate+'로 변경했습니다!');
  render();
}

function bulkSaveAll(){
  saveList();
  // 현재 form에 열려있는 학생도 업데이트
  if(form.id){

  bulkResults={};

  alert(`✅ ${cnt}명 피드백이 저장됐습니다!`);
  render();
}

<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${d.name} 학습 리포트 - ${sn}</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#f0f4f8;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:16px;min-height:100vh;font-size:17px}.wrap{width:100%;max-width:600px;margin:0 auto;padding:16px 16px 50px}</style>
</head><body><div class="wrap">
  <div style="background:#0369a1;padding:26px 18px;border-radius:16px;color:white;position:relative;overflow:hidden;margin-bottom:0">
    <div style="position:absolute;top:-25px;right:-25px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.08)"></div>
    <div style="font-size:14px;opacity:0.75;letter-spacing:0.5px;margin-bottom:5px">🏫 ${sn}${tn} · ONE REPORT</div>
    <div style="font-size:30px;font-weight:700">${d.name} 학습 리포트</div>
    <div style="font-size:17px;opacity:0.85;margin-top:5px">${d.grade} · 진단일 ${d.date}</div>
    ${d.bookname?`<div style="font-size:14px;opacity:0.7;margin-top:4px">📖 ${d.bookname}</div>`:''}
  </div>
  <div style="background:white;border-radius:14px;padding:15px;margin-top:12px;border:1px solid #e0f2fe;box-shadow:0 4px 16px rgba(14,165,233,0.08)">
    <div style="font-size:17px;font-weight:700;color:#0d2240;margin-bottom:16px;font-weight:800">📊 종합 성적</div>
    <div style="display:flex;align-items:center;gap:18px">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="46" fill="none" stroke="#e2e8f0" stroke-width="9"/>
        <circle cx="55" cy="55" r="46" fill="none" stroke="#0ea5e9" stroke-width="9" stroke-dasharray="${(sv/100)*(2*Math.PI*46)} ${2*Math.PI*46}" stroke-linecap="round" transform="rotate(-90 55 55)"/>
        <text x="55" y="51" text-anchor="middle" fill="#0ea5e9" font-size="24" font-weight="700" font-family="sans-serif">${sv}</text>
        <text x="55" y="70" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="sans-serif">점</text>
      </svg>
      <div style="flex:1;display:flex;flex-direction:column;gap:10px">
        <div style="background:#f8fafc;border-radius:12px;padding:11px 15px">
          <div style="font-size:13px;color:#94a3b8">등급</div>
          <div style="font-size:32px;font-weight:700;color:${GCf(d.level)}">${d.level||'-'}<span style="font-size:17px;font-weight:500">등급</span></div>
        </div>
        ${d.rank&&d.total&&d.showRank!==false?`<div style="background:#f8fafc;border-radius:12px;padding:11px 15px">
          <div style="font-size:13px;color:#94a3b8">전국 등수</div>
          <div style="font-size:20px;font-weight:700;color:#334155"><span style="color:#0ea5e9">${d.rank}</span><span style="font-size:14px;color:#94a3b8;font-weight:400">등 / ${d.total}명</span></div>
          <div style="height:6px;background:#e2e8f0;border-radius:99px;margin-top:5px;overflow:hidden"><div style="height:100%;width:${100-rp}%;background:#0ea5e9;border-radius:99px"></div></div>
          <div style="font-size:13px;color:#94a3b8;margin-top:3px">상위 ${rp}%</div>
        </div>`:''}
      </div>
    </div>
    ${d.avgScore?`<div style="margin-top:13px;background:#f0f9ff;border-radius:12px;padding:11px 15px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:15px;color:#64748b">전국 평균 대비</span>
      <span style="font-size:18px;font-weight:700;color:${Number(d.score)>=Number(d.avgScore)?'#16a34a':'#ef4444'}">${Number(d.score)>=Number(d.avgScore)?'▲':'▼'} ${Math.round(Math.abs(Number(d.score)-Number(d.avgScore)))}점</span>
    </div>`:''}
  </div>
  ${unitsH}${swH}${behavH}${itemsH}${hwH}
  ${d.comment?`<div style="background:#0369a1;border-radius:14px;padding:18px 20px;margin-top:13px;color:white">
    <div style="font-size:16px;font-weight:700;margin-bottom:8px">💬 선생님 총평</div>
    <div style="font-size:16px;line-height:1.9;opacity:0.95;white-space:pre-wrap">${d.comment}</div>
  </div>`:''}
  <div style="text-align:center;margin-top:18px;font-size:13px;color:#94a3b8">🏫 ${sn}${tn} · Lumen Math Academy</div>
</div></body></html>`;
}

// 학생 전체 기록을 담은 멀티 리포트 HTML 생성 (미리렌더링 방식 - iPhone 호환)
function buildMultiReportHTML(reports){
  if(!reports||!reports.length)return'';
  const d0=reports[0];
  const sn=schoolName||'루멘수학';
  const tn=teacherName?` · ${teacherName}`:'';

  function buildBody(d){
    const gcFn=g=>{const n=Number(g);if(n<=1)return'#10b981';if(n===2)return'#3b82f6';if(n===3)return'#f59e0b';if(n===4)return'#f97316';return'#ef4444';};
    const scFn=s=>{const n=Number(s);if(n>=85)return'#10b981';if(n>=75)return'#3b82f6';if(n>=65)return'#f59e0b';return'#ef4444';};
    const sv=Number(d.score)||0;
    const rp=d.total?Math.round((Number(d.rank)/Number(d.total))*100):0;
    const hdrBg=(g=>{const n=Number(g);if(n<=1)return'linear-gradient(135deg,#064e3b,#059669)';if(n===2)return'linear-gradient(135deg,#0d2240,#1d6fe8)';if(n===3)return'linear-gradient(135deg,#451a03,#d97706)';if(n===4)return'linear-gradient(135deg,#431407,#ea580c)';return'linear-gradient(135deg,#450a0a,#dc2626)';})(d.level);
    const gc2=gcFn(d.level);
    const circ=2*Math.PI*46;
    const dash=(sv/100)*circ;

    const wR=reports.filter(r=>r.testType==='weekly'&&r.score).slice().reverse();
    const cR=reports.filter(r=>r.testType!=='weekly'&&r.score).slice().reverse();
    let growthH='';
    if(wR.length>=1||cR.length>=1){
      const allSc=[...wR,...cR].map(r=>Number(r.score));
      const gmn=Math.max(0,Math.min(...allSc)-15),gmx=Math.min(100,Math.max(...allSc)+15);
      const GW=320,GH=110,GP=18;
      const gPts=arr=>{const sc=arr.map(r=>Number(r.score));if(sc.length===1){const x=GW/2,y=GH-GP-18-(sc[0]-gmn)/((gmx-gmn)||1)*(GH-GP*2-18);return{pts:[x+','+y],scores:sc,single:true};}const xs=(GW-GP*2)/(sc.length-1),ys=(GH-GP*2-18)/((gmx-gmn)||1);return{pts:sc.map((s,i)=>(GP+i*xs)+','+(GH-GP-18-(s-gmn)*ys)),scores:sc,single:false};};
      const wg=wR.length?gPts(wR):{pts:[],scores:[],single:false};
      const cg=cR.length?gPts(cR):{pts:[],scores:[],single:false};
      const wL=wg.scores.length?wg.scores[wg.scores.length-1]:null;
      const cL=cg.scores.length?cg.scores[cg.scores.length-1]:null;
      const wPv=wg.scores.length>=2?wg.scores[wg.scores.length-2]:null;
      const cPv=cg.scores.length>=2?cg.scores[cg.scores.length-2]:null;
      const wTc=wL&&wPv?(wL>wPv?'#10b981':wL<wPv?'#ef4444':'#94a3b8'):'#0ea5e9';
      const cTc=cL&&cPv?(cL>cPv?'#10b981':cL<cPv?'#ef4444':'#94a3b8'):'#22c55e';
      const wLbl=wL?(wg.single?wL+'점(1회)':(wPv?(wL>wPv?'↑'+(wL-wPv)+'점':'↓'+(wPv-wL)+'점'):'→')+' '+wL+'점'):'';
      const cLbl=cL?(cg.single?cL+'점(1회)':(cPv?(cL>cPv?'↑'+(cL-cPv)+'점':'↓'+(cPv-cL)+'점'):'→')+' '+cL+'점'):'';
      growthH='<div style="background:white;border-radius:18px;padding:22px;margin-top:18px;border:1px solid #e8eef8">'
        +'<div style="font-size:20px;font-weight:800;color:#0d2240;margin-bottom:16px">📈 성장 추이</div>'
        +'<div style="display:flex;gap:18px;margin-bottom:14px;flex-wrap:wrap">'
        +(wL?'<div style="display:flex;align-items:center;gap:7px"><div style="width:26px;height:4px;background:#0ea5e9;border-radius:99px"></div><span style="font-size:17px;color:#64748b">전국주간</span><span style="font-size:18px;font-weight:700;color:'+wTc+'">'+wLbl+'</span></div>':'')
        +(cL?'<div style="display:flex;align-items:center;gap:7px"><div style="width:26px;height:4px;background:#22c55e;border-radius:99px"></div><span style="font-size:17px;color:#64748b">일일</span><span style="font-size:18px;font-weight:700;color:'+cTc+'">'+cLbl+'</span></div>':'')
        +'</div>'
        +'<svg width="100%" height="'+GH+'" viewBox="0 0 '+GW+' '+GH+'" preserveAspectRatio="none" style="overflow:visible">'
        +(wg.pts.length>=2&&!wg.single?'<polyline points="'+wg.pts.join(' ')+'" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>':'')
        +(cg.pts.length>=2&&!cg.single?'<polyline points="'+cg.pts.join(' ')+'" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>':'')
        +wg.pts.map((pt,i)=>{const xy=pt.split(','),x=xy[0],y=xy[1],cur=i===wg.pts.length-1;return'<circle cx="'+x+'" cy="'+y+'" r="'+(cur?7:4)+'" fill="'+(cur?'#0369a1':'#7dd3fc')+'" stroke="white" stroke-width="2"/><text x="'+x+'" y="'+(Number(y)-13)+'" text-anchor="middle" fill="'+(cur?'#0369a1':'#64748b')+'" font-size="'+(cur?15:12)+'" font-weight="'+(cur?'700':'400')+'" font-family="sans-serif">'+wg.scores[i]+'</text>';}).join('')
        +cg.pts.map((pt,i)=>{const xy=pt.split(','),x=xy[0],y=xy[1],cur=i===cg.pts.length-1;return'<circle cx="'+x+'" cy="'+y+'" r="'+(cur?7:4)+'" fill="'+(cur?'#15803d':'#86efac')+'" stroke="white" stroke-width="2"/><text x="'+x+'" y="'+(Number(y)+22)+'" text-anchor="middle" fill="'+(cur?'#15803d':'#64748b')+'" font-size="'+(cur?15:12)+'" font-weight="'+(cur?'700':'400')+'" font-family="sans-serif">'+cg.scores[i]+'</text>';}).join('')
        +'</svg>'
        +((wg.single||cg.single)?'<div style="font-size:15px;color:#94a3b8;margin-top:8px;text-align:center">💡 2회 이상 기록되면 추이선이 표시됩니다</div>':'')
        +'</div>';
    }

    let unitsH='';
    if((d.units||[]).some(u=>u&&u.name)){
      unitsH='<div style="background:white;border-radius:18px;padding:22px;margin-top:18px;border:1px solid #e8eef8"><div style="font-size:20px;font-weight:800;color:#0d2240;margin-bottom:18px">📚 단원별 정답률</div>';
      d.units.filter(u=>u&&u.name).forEach(u=>{const uc=scFn(u.student);unitsH+='<div style="margin-bottom:20px"><div style="display:flex;justify-content:space-between;margin-bottom:9px"><span style="font-size:19px;font-weight:600;color:#334155">'+u.name+'</span><span style="font-size:19px;font-weight:700;color:'+uc+'">'+u.student+'%</span></div><div style="height:16px;background:#f1f5f9;border-radius:99px;overflow:hidden;position:relative">'+(u.avg?'<div style="position:absolute;height:100%;width:'+u.avg+'%;background:#cbd5e1;border-radius:99px"></div>':'')+'<div style="position:absolute;height:100%;width:'+u.student+'%;background:'+uc+';border-radius:99px"></div></div>'+(u.avg?'<div style="font-size:15px;color:#94a3b8;margin-top:5px">학생 '+u.student+'% · 전국평균 '+u.avg+'%</div>':'')+'</div>';});
      unitsH+='</div>';
    }

    const sItems=(d.strong||[]).filter(s=>s&&s.topic);
    const wItems=(d.weak||[]).filter(w=>w&&w.topic);
    let swH='';
    if(sItems.length||wItems.length){
      swH='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px">'
        +'<div style="background:white;border-radius:18px;padding:20px;border:1px solid #d1fae5"><div style="font-size:18px;font-weight:700;color:#059669;margin-bottom:14px">✨ 우수 유형</div>'+sItems.map(s=>'<div style="display:flex;gap:12px;margin-bottom:14px"><div style="min-width:36px;height:36px;border-radius:9px;background:#ecfdf5;border:1px solid #6ee7b7;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#059669">'+s.num+'</div><div style="font-size:18px;font-weight:600;color:#334155;line-height:1.4">'+s.topic+'</div></div>').join('')+'</div>'
        +'<div style="background:white;border-radius:18px;padding:20px;border:1px solid #fee2e2"><div style="font-size:18px;font-weight:700;color:#dc2626;margin-bottom:14px">🎯 집중 보완</div>'+wItems.map(w=>'<div style="display:flex;gap:12px;margin-bottom:14px"><div style="min-width:36px;height:36px;border-radius:9px;background:#fff1f2;border:1px solid #fca5a5;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#dc2626">'+w.num+'</div><div style="font-size:18px;font-weight:600;color:#334155;line-height:1.4">'+w.topic+'</div></div>').join('')+'</div>'
        +'</div>';
    }

    const bvs=(d.behaviors||[]).filter(b=>b&&b.score);
    let behavH='';
    if(bvs.length){
      // 레이더 차트 생성
      const N=bvs.length,CX=120,CY=105,R=70;
      const angles=bvs.map((_,i)=>(Math.PI*2*i/N)-Math.PI/2);
      const pt=(r,i)=>({x:CX+r*Math.cos(angles[i]),y:CY+r*Math.sin(angles[i])});
      const gridH=[0.25,0.5,0.75,1].map((lv,gi)=>{
        const pts=bvs.map((_,i)=>{const p=pt(R*lv,i);return p.x+','+p.y;}).join(' ');
        return '<polygon points="'+pts+'" fill="'+(gi===3?'none':'rgba(30,58,110,0.03)')+'" stroke="rgba(30,58,110,'+(gi===3?'0.15':'0.08')+')" stroke-width="'+(gi===3?'1.5':'1')+'"/>';
      }).join('');
      const axesH=bvs.map((_,i)=>{const p=pt(R,i);return'<line x1="'+CX+'" y1="'+CY+'" x2="'+p.x+'" y2="'+p.y+'" stroke="rgba(30,58,110,0.1)" stroke-width="1"/>';}).join('');
      const dataH=bvs.map((b,i)=>{const p=pt(R*(Number(b.score)||0)/100,i);return p.x+','+p.y;}).join(' ');
      const labelsH=bvs.map((b,i)=>{
        const lp=pt(R+22,i);
        const anc=Math.cos(angles[i])>0.1?'start':Math.cos(angles[i])<-0.1?'end':'middle';
        const col=gcFn(b.grade);
        return '<text x="'+lp.x+'" y="'+(lp.y+3)+'" text-anchor="'+anc+'" font-size="10" font-weight="700" fill="#334155" font-family="\'Noto Sans KR\',sans-serif">'+b.name+'</text>'
          +'<text x="'+lp.x+'" y="'+(lp.y+15)+'" text-anchor="'+anc+'" font-size="9.5" font-weight="700" fill="'+col+'" font-family="sans-serif">'+b.score+'%</text>';
      }).join('');
      const dotsH=bvs.map((b,i)=>{const p=pt(R*(Number(b.score)||0)/100,i);return'<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="#1d6fe8" stroke="white" stroke-width="2"/>';}).join('');
      const legendH=bvs.map(b=>{const col=gcFn(b.grade);return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0"></div><span style="font-size:15px;color:#475569;flex:1">'+b.name+'</span><span style="font-size:15px;font-weight:800;color:'+col+'">'+b.score+'%</span>'+(b.grade?'<span style="font-size:12px;font-weight:700;background:'+col+'18;color:'+col+';padding:2px 8px;border-radius:20px">'+b.grade+'등급</span>':'')+'</div>';}).join('');
      behavH='<div style="background:white;border-radius:18px;padding:22px;margin-top:18px;border:1px solid #e8eef8">'
        +'<div style="font-size:20px;font-weight:800;color:#0d2240;margin-bottom:18px">🧠 역량별 분석</div>'
        +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
        +'<svg width="240" height="210" viewBox="0 0 240 210" style="flex-shrink:0;display:block">'+gridH+axesH+'<polygon points="'+dataH+'" fill="rgba(29,111,232,0.12)" stroke="#1d6fe8" stroke-width="2.5" stroke-linejoin="round"/>'+labelsH+dotsH+'</svg>'
        +'<div style="flex:1;min-width:120px">'+legendH+'</div>'
        +'</div></div>';
    }

    const namedItems=(d.items||[]).filter(it=>it&&it.name);
    let itemsH='';
    if(namedItems.length){
      const corrI=namedItems.filter(it=>it.correct),wrongI=namedItems.filter(it=>!it.correct);
      const iRow=it=>{const ic=scFn(it.score);return'<div style="display:flex;align-items:center;gap:13px;padding:14px 20px;border-bottom:1px solid #f8fafc"><div style="min-width:38px;height:38px;border-radius:10px;background:'+(it.correct?'#ecfdf5':'#fff1f2')+';border:1px solid '+(it.correct?'#6ee7b7':'#fca5a5')+';display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:'+(it.correct?'#059669':'#dc2626')+'">'+it.n+'</div><div style="flex:1;font-size:18px;font-weight:500;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+it.name+'</div><div style="width:70px;height:9px;background:#f1f5f9;border-radius:99px;overflow:hidden;flex-shrink:0"><div style="height:100%;width:'+Math.min(100,it.score||0)+'%;background:'+ic+';border-radius:99px"></div></div><span style="font-size:18px;font-weight:700;color:'+ic+';min-width:46px;text-align:right;flex-shrink:0">'+it.score+'%</span></div>';};
      // ★ <details>/<summary> - JS 완전 불필요, iOS Safari 네이티브 동작
      itemsH='<div style="background:white;border-radius:18px;margin-top:18px;border:1px solid #e8eef8;overflow:hidden">'
        +'<div style="padding:20px 22px 15px;border-bottom:1px solid #f1f5f9"><div style="font-size:20px;font-weight:800;color:#0d2240">📝 문항별 상세 결과</div><div style="display:flex;gap:10px;margin-top:12px"><div style="background:#ecfdf5;border-radius:10px;padding:7px 15px;font-size:17px;font-weight:700;color:#059669">정답 '+corrI.length+'문항</div><div style="background:#fff1f2;border-radius:10px;padding:7px 15px;font-size:17px;font-weight:700;color:#dc2626">오답 '+wrongI.length+'문항</div></div></div>'
        +(wrongI.length
          ?'<details open style="border-bottom:1px solid #fee2e2"><summary style="padding:16px 22px;background:#fff8f8;display:flex;justify-content:space-between;align-items:center;cursor:pointer;list-style:none;-webkit-appearance:none"><span style="font-size:18px;font-weight:700;color:#dc2626">집중 보완 ('+wrongI.length+'개)</span><span style="font-size:17px;color:#dc2626">▼</span></summary>'+wrongI.map(iRow).join('')+'</details>'
          :'')
        +(corrI.length
          ?'<details style="border-bottom:1px solid #f1f5f9"><summary style="padding:16px 22px;background:#f8fffe;display:flex;justify-content:space-between;align-items:center;cursor:pointer;list-style:none;-webkit-appearance:none"><span style="font-size:18px;font-weight:700;color:#059669">정답 문항 ('+corrI.length+'개)</span><span style="font-size:17px;color:#059669">▼</span></summary>'+corrI.map(iRow).join('')+'</details>'
          :'')
        +'</div>';
    }

    let hwH='';
    if(d.homework&&d.homework.show&&(d.homework.rows||[]).length){

async function downloadAllStudents(){
  const groups=groupStudents();
  if(!groups.length){alert('저장된 학생이 없습니다');return;}
  const btn=document.getElementById('bulk-dl-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ 다운로드 중...';}
  let count=0;
  for(const g of groups){
    const all=list.filter(r=>r.name===g.name&&r.grade===g.grade)
      .sort((a,b)=>(normalizeDate(b.date)||'').localeCompare(normalizeDate(a.date)||''));
    if(!all.length)continue;
    const html=all.length>=1?buildMultiReportHTML(all):buildReportHTML(all[0]);
    const blob=new Blob(['\uFEFF'+html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const ld2=(all[0]?.date||'').replace(/\./g,'');
    a.download=`[학부모용]_${g.name}_${ld2}_루멘수학리포트.html`;
    a.click();
    URL.revokeObjectURL(url);
    count++;
    await new Promise(r=>setTimeout(r,400)); // 브라우저가 각 파일 처리할 시간
  }
  if(btn){btn.disabled=false;btn.textContent=`📥 전체 학생 일괄 다운로드 (${groups.length}명)`;}
  alert(`✅ ${count}명 학생 리포트가 다운로드됐어요!\n다운로드 폴더에서 확인해주세요.`);
}

/* ── 중복 학생 감지 및 통합 ── */
function detectDuplicates(){
  // 같은 이름이지만 학년이 다른 그룹 찾기 (리포트 기준)
  const all=groupStudents();
  const byName={};
  all.forEach(g=>{
    if(!byName[g.name])byName[g.name]=[];
    byName[g.name].push(g);
  });
  return Object.values(byName).filter(arr=>arr.length>1);
}

function detectStudentDbDuplicates(){
  const byName={};
  students.forEach(s=>{
    if(!byName[s.name])byName[s.name]=[];
    byName[s.name].push(s);
  });
  return Object.values(byName).filter(arr=>arr.length>1);
}

// 리포트 통합: name의 fromGrade 리포트들을 toGrade로 병합
function mergeReportGroups(name, toGrade, fromGrade){
  if(!confirm(`"${name}" 학생의 [${fromGrade.replace('학교','').replace('학년','년')}] 리포트를 [${toGrade.replace('학교','').replace('학년','년')}]으로 통합합니다.\n\n이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?`))return;
  // fromGrade → toGrade 로 학년 변경
  const toSt=students.find(s=>s.name===name&&s.grade===toGrade);
  list=list.map(r=>{
    if(r.name===name&&r.grade===fromGrade){
      r.grade=toGrade;
      if(toSt)r.studentId=toSt.id;
    }
    return r;
  });
  saveList();
  // 등록부에서 fromGrade 항목 제거 (있으면)
  const fromSt=students.find(s=>s.name===name&&s.grade===fromGrade);
  if(fromSt)students=students.filter(s=>s.id!==fromSt.id);
  saveStudents();
  MERGE_PENDING=null;
  SELECTED_STUDENT=name+'__'+toGrade;
  VIEW='student_detail';
  render();
  setTimeout(()=>alert(`✅ 통합 완료!\n모든 리포트가 [${toGrade}] 기준으로 합쳐졌습니다.`),100);
}

// 등록부 중복 통합
function mergeStudentDb(keepId, dropId){
  const keep=students.find(s=>s.id===keepId);
  const drop=students.find(s=>s.id===dropId);
  if(!keep||!drop)return;
  if(!confirm(`"${drop.name}" 등록부 중복을 통합합니다.\n유지: ${keep.grade||'학년미설정'}\n삭제: ${drop.grade||'학년미설정'}\n\n삭제 항목의 리포트는 유지 항목에 연결됩니다.`))return;
  // drop의 리포트 → keep으로 재연결 (학년도 통일)
  list=list.map(r=>{
    if(r.studentId===dropId||(!r.studentId&&r.name===drop.name&&r.grade===drop.grade)){
      r.studentId=keepId;
      if(keep.grade)r.grade=keep.grade;
    }
    return r;
  });
  saveList();
  students=students.filter(s=>s.id!==dropId);
  saveStudents();
  render();
  alert(`✅ 등록부 통합 완료!`);
}

// 진도 지연 계산
function calcExpectedPage(book, assignedBook, studentLevel, classDaysPerWeek){
  if(!book||!assignedBook)return 0;
  const lv=studentLevel||'중';
  const ppc=parseInt((book.level||{})[lv]?.pagesPerClass)||0;
  if(!ppc)return 0;
  const raw=(assignedBook.startDate||'').replace(/\./g,'-');
  const startD=new Date(raw);
  if(isNaN(startD.getTime()))return 0;
  const today=new Date();today.setHours(0,0,0,0);
  const daysPassed=Math.max(0,Math.floor((today-startD)/(1000*60*60*24)));
  const sessionsPassed=daysPassed/7*(classDaysPerWeek||2);
  const total=parseInt(book.totalPages)||0;
  return total>0?Math.min(total,Math.round(sessionsPassed*ppc)):Math.round(sessionsPassed*ppc);
}
function getDelayStatus(actualPage,expectedPage,book,studentLevel){
  if(!expectedPage||expectedPage<=0)return null;
  const lv=studentLevel||'중';
  const ppc=parseInt((book.level||{})[lv]?.pagesPerClass)||0;
  const gap=expectedPage-(actualPage||0);
  if(gap<=0)return{label:'정상',color:'#059669',bg:'#ecfdf5',border:'#6ee7b7',icon:'✅'};
  if(!ppc)return null;
  const behind=gap/ppc;
  if(behind<=1)return{label:'주의',color:'#d97706',bg:'#fffbeb',border:'#fcd34d',icon:'⚠️'};
  if(behind<=2)return{label:'경고',color:'#ea580c',bg:'#fff7ed',border:'#fdba74',icon:'🔶'};
  return{label:'위험',color:'#dc2626',bg:'#fff1f2',border:'#fca5a5',icon:'🚨'};
}

function rStudentTab_현황(name,grade,reports,stInfo,latest,gc,avgScore){
  const lv=stInfo?.lumen_studentLevel||'중';
  const ab=stInfo?.lumen_assignedBooks||[];
  const cpw=stInfo?.lumen_classDaysPerWeek||2;

  // 성적 데이터
  const weekly=reports.filter(r=>r.testType==='weekly'&&r.score);
  const cls=reports.filter(r=>r.testType!=='weekly'&&r.score);
  const wLatest=weekly.length?Number(weekly[0].score):null;
  const wPrev=weekly.length>=2?Number(weekly[1].score):null;
  const cLatest=cls.length?Number(cls[0].score):null;

  const trendCol=(s,p)=>!s?'#94a3b8':(!p?'#64748b':(s>p?'#059669':s<p?'#dc2626':'#64748b'));

  // 숙제 히트맵 데이터

    if(!dayHw)return{bg:'#f8fafc',text:'#e2e8f0',label:'',icon:''};
    var entries=Object.values(dayHw).filter(function(h){return h&&h.stage&&h.stage!=='없음';});
    if(!entries.length)return{bg:'#f8fafc',text:'#e2e8f0',label:'',icon:''};
    if(entries.some(function(h){return h.stage==='아하노트';}))
      return{bg:'#f3e8ff',text:'#7c3aed',label:'아하노트',icon:'🟣'};
    var maxPct=Math.max.apply(null,entries.map(function(h){return h.pct||0;}));
    var stageOrder=['풀이','채점','오답','아하노트'];
    var sorted=entries.slice().sort(function(a,b){return stageOrder.indexOf(b.stage)-stageOrder.indexOf(a.stage);});
    var topStage=sorted[0].stage;
    if(maxPct===100||topStage==='오답')return{bg:'#dcfce7',text:'#15803d',label:'완료',icon:'🟢'};
    if(maxPct>=60||topStage==='채점')return{bg:'#fef9c3',text:'#92400e',label:'채점',icon:'🟡'};
    if(maxPct>=30||topStage==='풀이')return{bg:'#dbeafe',text:'#1d4ed8',label:'풀이',icon:'🔵'};
    return{bg:'#fee2e2',text:'#dc2626',label:'미흡',icon:'🔴'};
  }

  // 히트맵 달력 생성
  var hwToday=new Date();hwToday.setHours(0,0,0,0);
  var hwTodayStr=hwToday.toISOString().slice(0,10).replace(/-/g,'.');
  var hwDays=[];
  for(var di=41;di>=0;di--){var dd=new Date(hwToday);dd.setDate(hwToday.getDate()-di);hwDays.push(dd.toISOString().slice(0,10).replace(/-/g,'.'));}
  var hwFirstDow=(new Date(hwDays[0].replace(/\./g,'-')).getDay()+6)%7;
  var hwWeeks2=[];var hwWeek2=[];
  for(var pi=0;pi<hwFirstDow;pi++)hwWeek2.push(null);
  hwDays.forEach(function(d){hwWeek2.push(d);if(hwWeek2.length===7){hwWeeks2.push(hwWeek2);hwWeek2=[];}});
  if(hwWeek2.length)hwWeeks2.push(hwWeek2);
  var DOW3=['월','화','수','목','금','토','일'];
  var hmHtml2='<table style="border-collapse:separate;border-spacing:3px">';

      const total=parseInt(bk.totalPages)||0;
      const actual=mp.currentPage||0;
      const progPct=total>0?Math.min(100,Math.round((actual/total)*100)):0;
      const exp=calcExpectedPage(bk,assignedBook,lv,cpw);
      const ds=getDelayStatus(actual,exp,bk,lv);
      const ppc=parseInt((bk.level||{})[lv]?.pagesPerClass)||0;

      // 타임라인 날짜 계산
      const startRaw2=(assignedBook.startDate||'').replace(/\./g,'-');
      const startD2=startRaw2?new Date(startRaw2):null;
      const today2=new Date();today2.setHours(0,0,0,0);
      const elapsedDays2=startD2&&!isNaN(startD2)?Math.max(0,Math.floor((today2-startD2)/(1000*60*60*24))):null;
      const startLabel2=startD2&&!isNaN(startD2)?`${startD2.getMonth()+1}/${startD2.getDate()}`:null;
      let finishLabel2=null,remainDays2=null;
      if(total>0&&ppc>0&&cpw>0&&actual<total){
        const remaining=Math.max(0,total-actual);
        const sessionsNeeded=Math.ceil(remaining/ppc);
        const daysNeeded=Math.ceil(sessionsNeeded/cpw*7);
        const finishD2=new Date(today2);finishD2.setDate(today2.getDate()+daysNeeded);
        finishLabel2=`${finishD2.getMonth()+1}/${finishD2.getDate()}`;
        remainDays2=daysNeeded;
      }

      // 히스토리 차트
      let chartHtml='';
      if(hist.length>=2){
        const W=320,H=70,PX=10,PY=12;
        const pages=hist.map(h=>h.page||0);
        const minP=Math.min(...pages);
        const maxP=Math.max(Math.max(...pages),total||1);
        const xStep=(W-PX*2)/(hist.length-1||1);
        const yScale=(H-PY*2)/(maxP-minP||1);
        const pts=hist.map((h,i)=>`${PX+i*xStep},${H-PY-(h.page-minP)*yScale}`).join(' ');
        const lastPt=hist[hist.length-1];
        chartHtml=`<div style="background:#f8fafc;border-radius:10px;padding:10px;margin:10px 0">
          <div style="font-size:12px;color:#64748b;font-weight:600;margin-bottom:6px">📊 진도 히스토리 (${hist.length}회 기록)</div>
          <div style="overflow-x:auto">
            <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible;max-width:100%">
              ${total>0?`<line x1="${PX}" y1="${H-PY-(total-minP)*yScale}" x2="${W-PX}" y2="${H-PY-(total-minP)*yScale}" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="5,4"/>
              <text x="${W-PX+2}" y="${H-PY-(total-minP)*yScale+4}" fill="#94a3b8" font-size="10" font-family="sans-serif">완료</text>`:''}
              <polyline points="${pts}" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              ${hist.map((h,i)=>{const x=PX+i*xStep;const y=H-PY-(h.page-minP)*yScale;const isLast=i===hist.length-1;
                return`<circle cx="${x}" cy="${y}" r="${isLast?5:3}" fill="${isLast?'#1d6fe8':'#93c5fd'}" stroke="white" stroke-width="1.5"/>
                ${isLast?`<text x="${x}" y="${y-9}" text-anchor="middle" fill="#1d6fe8" font-size="11" font-weight="700" font-family="sans-serif">${h.page}p</text>`:''}`;}).join('')}
            </svg>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;margin-top:4px">
            <span>${hist[0].date.slice(5).replace('.','/') }</span>
            <span>${lastPt.date.slice(5).replace('.','/') }</span>
          </div>
        </div>`;
      } else if(hist.length===1){
        chartHtml=`<div style="background:#f8fafc;border-radius:10px;padding:10px;margin:8px 0;font-size:12px;color:#64748b">
          📍 기록 1회 · ${hist[0].date} · ${hist[0].page}p
        </div>`;
      }

      const todayPage=(hist.find(h=>h.date===MEMO_DATE)||{}).page||actual||'';

      h+=`<div style="background:white;border:1.5px solid ${ds?ds.border:'#e8edf5'};border-radius:16px;overflow:hidden">
        <!-- 교재 헤더 -->
        <div style="padding:10px 14px;background:${ds?ds.bg:'#f8fafc'};display:flex;align-items:center;justify-content:space-between">
          <div>
            <span style="font-size:10px;padding:1px 6px;border-radius:20px;background:${bk.type==='선행'?'#fee2e2':'#dbeafe'};color:${bk.type==='선행'?'#dc2626':'#1d4ed8'};font-weight:700;margin-right:5px">${bk.type}</span>
            <span style="font-size:14px;font-weight:800;color:#0d2240">${bk.name}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            ${ds?`<span style="font-size:11px;font-weight:700;color:${ds.color}">${ds.icon}${ds.label}</span>`:''}
            <span style="font-size:14px;font-weight:800;color:#1d6fe8">${progPct}%</span>
          </div>
        </div>

        <div style="padding:12px 14px">
          <!-- 진도바 -->
          <div style="height:12px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-bottom:6px;position:relative">
            ${exp>0&&total>0?`<div style="position:absolute;left:${Math.min(100,Math.round((exp/total)*100))}%;top:0;width:3px;height:100%;background:#f59e0b;transform:translateX(-50%);z-index:2"></div>`:''}
            <div style="height:100%;width:${progPct}%;background:${ds?ds.color:'#3b82f6'};border-radius:99px"></div>
          </div>

          <!-- 타임라인 -->
          <div style="background:#f8fafc;border-radius:10px;padding:10px 12px;border:1px solid #e2e8f0;margin-bottom:10px">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center">
              <div style="border-right:1px solid #e2e8f0">
                <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:2px">📅 시작일</div>
                <div style="font-size:14px;font-weight:800;color:#334155">${startLabel2||'미설정'}</div>
              </div>
              <div style="border-right:1px solid #e2e8f0">
                <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:2px">⏱ 경과</div>
                <div style="font-size:14px;font-weight:800;color:#334155">${elapsedDays2!==null?elapsedDays2+'일':'-'}</div>
              </div>
              <div>
                <div style="font-size:11px;color:#94a3b8;font-weight:600;margin-bottom:2px">🏁 완료예정</div>
                <div style="font-size:13px;font-weight:800;color:${ds?.label==='위험'?'#dc2626':ds?.label==='경고'?'#ea580c':ds?.label==='주의'?'#d97706':'#059669'}">${finishLabel2||'계산중'}</div>
                ${remainDays2?`<div style="font-size:10px;color:#94a3b8">${remainDays2}일 후</div>`:''}
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0">
              <span>현재 <strong style="color:#0d2240">${actual}${total?'/'+total+'p':''}</strong></span>
              ${exp>0?`<span style="color:${ds?ds.color:'#f59e0b'}">오늘 예상 <strong>${exp}p</strong> · ${ppc?lv+'위권 '+ppc+'p/회':''}</span>`:''}
            </div>
          </div>

          ${chartHtml}

          <!-- 오늘 진도 입력 -->
          <div style="background:#eff6ff;border-radius:10px;padding:10px 12px;border:1.5px solid #bfdbfe">
            <div style="font-size:10px;font-weight:700;color:#0369a1;margin-bottom:6px">📍 ${MEMO_DATE} 진도 입력</div>
            <div style="display:flex;align-items:center;gap:8px">
              <input type="number" min="0" max="${total||9999}"
                id="page-inp-${stInfo.id}-${bk.id}"
                value="${todayPage}"
                placeholder="현재 페이지"
                style="flex:1;border:2px solid #93c5fd;border-radius:8px;padding:8px;text-align:center;font-size:16px;font-weight:800;color:#0d2240;font-family:inherit;outline:none">
              ${total?`<span style="font-size:12px;color:#94a3b8;flex-shrink:0">/ ${total}p</span>`:''}
              <button onclick="saveCurrentPage('${stInfo.id}','${bk.id}',document.getElementById('page-inp-${stInfo.id}-${bk.id}').value);const b=this;b.textContent='✅';b.style.background='#059669';setTimeout(()=>{b.textContent='저장';b.style.background='#1d6fe8';},1500)"
                style="padding:8px 14px;background:#1d6fe8;color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">저장</button>
            </div>
          </div>
        </div>
      </div>`;
    });
  }

  // ── 과거 메모 목록 ──
  const pastMemos=Object.entries(memos).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10);
  if(pastMemos.length){
    h+=`<div style="background:white;border:1.5px solid #e8edf5;border-radius:14px;padding:14px">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:0.5px;margin-bottom:10px">📋 수업 메모 기록</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${pastMemos.map(([date,memo])=>`
          <div style="border-left:3px solid #bfdbfe;padding:6px 10px;background:#f8fafc;border-radius:0 8px 8px 0;cursor:pointer"
            onclick="MEMO_DATE='${date}';render()">
            <div style="font-size:10px;font-weight:700;color:#0369a1;margin-bottom:3px">${date}</div>
            <div style="font-size:12px;color:#475569;line-height:1.5">${memo.slice(0,80)}${memo.length>80?'...':''}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  h+=`</div>`;
  return h;
}

// 수업 메모 저장 함수
function saveClassMemo(stId, date, val){
  const st=students.find(s=>s.id===stId);
  if(!st)return;
  if(!st.lumen_classMemo)st.lumen_classMemo={};
  if(val.trim()) st.lumen_classMemo[date]=val.trim();
  else delete st.lumen_classMemo[date];
  saveStudents();
}

// ── 탭: 숙제 ──────────────────────────────────
function rStudentTab_숙제(name,grade,reports,stInfo){
  // stInfo 없으면 안내
  if(!stInfo){
    return `<div style="padding:30px;text-align:center;color:#94a3b8">
      <div style="font-size:36px;margin-bottom:10px">📋</div>
      <div style="font-size:14px;font-weight:700;color:#334155;margin-bottom:8px">학생 등록부 미연동</div>
      <div style="font-size:13px;margin-bottom:14px">설정 탭에서 교재를 배정해야 숙제 체크가 가능해요</div>
      <button onclick="STUDENT_TAB='설정';render()"
        style="padding:10px 20px;background:#1d6fe8;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
        설정 탭으로 →
      </button>
    </div>`;
  }

  const stId = stInfo.id; // 안전하게 변수로 추출
  const hwCheck = (stInfo&&stInfo.lumen_homeworkCheck)||{};
  const hwAllDates = Object.keys(hwCheck).sort();
  const stBooks = ((stInfo&&stInfo.lumen_assignedBooks)||[]).map(ab=>books.find(b=>b.id===ab.bookId)).filter(Boolean);

  // 이 학생 과제 목록
  const stAsgn = assignments.filter(a=>{
    if(a.targetType==='student') return a.targetStudentId===stId;
    if(a.targetType==='group') return a.targetGroup===(stInfo.group||'');
    return false;
  });

  // 색상 함수
  function hwColor3(dayHw){
    if(!dayHw) return {bg:'#f8fafc',text:'#e2e8f0',label:'',icon:''};
    var entries = Object.values(dayHw).filter(h=>h&&h.stage&&h.stage!=='없음');
    if(!entries.length) return {bg:'#f8fafc',text:'#e2e8f0',label:'',icon:''};
    if(entries.some(h=>h.stage==='아하노트')) return {bg:'#f3e8ff',text:'#7c3aed',label:'아하노트',icon:'🟣'};
    var maxPct = Math.max(...entries.map(h=>h.pct||0));
    var order = ['풀이','채점','오답','아하노트'];
    var top = entries.slice().sort((a,b)=>order.indexOf(b.stage)-order.indexOf(a.stage))[0].stage;
    if(maxPct===100||top==='오답') return {bg:'#dcfce7',text:'#15803d',label:'완료',icon:'🟢'};
    if(maxPct>=60||top==='채점')  return {bg:'#fef9c3',text:'#92400e',label:'채점',icon:'🟡'};
    if(maxPct>=30||top==='풀이')  return {bg:'#dbeafe',text:'#1d4ed8',label:'풀이',icon:'🔵'};
    return {bg:'#fee2e2',text:'#dc2626',label:'미흡',icon:'🔴'};
  }

  // 이번달 완료율
  const now = new Date();
  const thisMonth = now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0');
  const thisMonthDates = hwAllDates.filter(d=>d.startsWith(thisMonth));
  var totalE=0, doneE=0, warnE=0;
  hwAllDates.forEach(d=>{
    const dh=hwCheck[d];
    Object.values(dh||{}).forEach(h=>{
      if(h&&h.stage&&h.stage!=='없음'){
        if(d.startsWith(thisMonth)){totalE++;if((h.pct||0)===100)doneE++;}
        if((h.pct||0)<30)warnE++;
      }
    });
  });
  const completionRate = totalE>0?Math.round(doneE/totalE*100):null;

  // 달력 생성
  function makeMonthCal(year, month){
    var first=new Date(year,month-1,1);
    var last=new Date(year,month,0);
    var fdow=(first.getDay()+6)%7;
    var rows=[]; var wk=[];
    for(var i=0;i<fdow;i++) wk.push(null);
    for(var d=1;d<=last.getDate();d++){
      wk.push({year,month,day:d});
      if(wk.length===7){rows.push(wk);wk=[];}
    }
    if(wk.length) rows.push(wk);
    return rows;
  }
  var hwToday=new Date();hwToday.setHours(0,0,0,0);
  var hwTodayStr=hwToday.toISOString().slice(0,10).replace(/-/g,'.');
  var curY=hwToday.getFullYear(),curM=hwToday.getMonth()+1;
  var prevM=curM===1?12:curM-1,prevY=curM===1?curY-1:curY;

  if(!window.HW_DETAIL_DATE) window.HW_DETAIL_DATE='';

  function renderCal(year,month,rows){
    var calH='<div style="margin-bottom:18px"><div style="font-size:13px;font-weight:800;color:#64748b;margin-bottom:8px">'+year+'년 '+month+'월</div>';
    calH+='<table style="border-collapse:separate;border-spacing:4px;width:100%"><tr>';
    ['월','화','수','목','금','토','일'].forEach(dw=>{
      calH+='<td style="text-align:center;font-size:11px;font-weight:700;color:#94a3b8;padding-bottom:4px">'+dw+'</td>';
    });
    calH+='</tr>';
    rows.forEach(wk=>{
      calH+='<tr>';
      wk.forEach(cell=>{
        if(!cell){calH+='<td></td>';return;}
        var dStr=cell.year+'.'+String(cell.month).padStart(2,'0')+'.'+String(cell.day).padStart(2,'0');
        var dh=hwCheck[dStr];
        var col=hwColor3(dh);
        var isToday=(dStr===hwTodayStr);
        var isSel=(dStr===window.HW_DETAIL_DATE);
        var hasDot=dh&&Object.values(dh).some(h=>h&&h.stage&&h.stage!=='없음');
        var border=isSel?'2px solid #7c3aed':isToday?'2px solid #1d6fe8':'1.5px solid '+(hasDot?col.text+'44':'#e2e8f0');
        calH+='<td style="text-align:center;vertical-align:middle;height:36px">';
        calH+='<div onclick="window.HW_DETAIL_DATE=\''+dStr+'\';render()" style="width:32px;height:32px;border-radius:8px;background:'+(hasDot?col.bg:'white')+';border:'+border+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:'+(isToday||isSel?'800':'500')+';color:'+(hasDot?col.text:isToday?'#1d6fe8':'#64748b')+';cursor:pointer;margin:auto">'+cell.day+'</div>';
        calH+='</td>';
      });
      calH+='</tr>';
    });
    calH+='</table></div>';
    return calH;
  }

  // 상세 패널 HTML 생성
  function renderDetailPanel(){
    if(!window.HW_DETAIL_DATE){
      return '<div style="text-align:center;padding:30px 10px;color:#94a3b8">'
        +'<div style="font-size:32px;margin-bottom:10px">👆</div>'
        +'<div style="font-size:13px;font-weight:700;color:#334155;margin-bottom:5px">날짜를 클릭하세요</div>'

    var dh = hwCheck[selDate]||{};
    var panelH = '<div>';
    panelH += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
      +'<div style="font-size:15px;font-weight:800;color:#0d2240">📅 '+selDate.slice(5).replace('.','/') +'</div>'
      +'<button onclick="window.HW_DETAIL_DATE=\'\';render()" style="font-size:12px;color:#94a3b8;background:none;border:none;cursor:pointer;font-family:inherit">닫기 ✕</button>'
      +'</div>';

    var hasContent = false;

    // 교재별 과제 연결 체크
    stBooks.forEach(bk=>{
      var bookAsgn = stAsgn.filter(a=>a.type==='book'&&a.bookId===bk.id);
      if(bookAsgn.length){
        bookAsgn.forEach(a=>{
          var hwKey = bk.id+'__'+a.id; // 구분자를 __ 로 변경

          var col = HW_COLORS[hw.stage]||HW_COLORS['없음'];
          var pct = hw.pct||0;
          var warnBg = pct<30&&hw.stage!=='없음'?'#fff1f2':'#f8fafc';
          var warnBorder = pct<30&&hw.stage!=='없음'?'#fca5a5':'#e8edf5';
          hasContent = true;
          panelH += '<div style="background:'+warnBg+';border:1.5px solid '+warnBorder+';border-radius:12px;padding:12px;margin-bottom:10px">'
            +'<div style="font-size:13px;font-weight:800;color:#0d2240;margin-bottom:2px">'+bk.name+'</div>'
            +'<div style="font-size:12px;color:#1d6fe8;font-weight:700;margin-bottom:8px">📄 '+a.startPage+'~'+a.endPage+'p</div>'
            +'<div style="display:flex;gap:4px;margin-bottom:6px">';
          HW_STAGES.forEach(sg=>{
            var on=hw.stage===sg; var sc=HW_COLORS[sg];
            panelH+='<button onclick="saveHwStageKey(\''+stId+'\',\''+hwKey+'\',\''+sg+'\',\''+selDate+'\');render()" '
              +'style="flex:1;padding:7px 2px;border-radius:8px;border:1.5px solid '+(on?sc.bar:'#e2e8f0')+';background:'+(on?sc.bg:'white')+';color:'+(on?sc.text:'#94a3b8')+';font-size:11px;font-weight:'+(on?'800':'600')+';cursor:pointer;font-family:inherit;white-space:nowrap">'+sg+'</button>';
          });
          panelH += '</div><div style="display:flex;gap:4px">';
          HW_PCTS.forEach(p=>{
            var on=pct===p;
            panelH+='<button onclick="saveHwPctKey(\''+stId+'\',\''+hwKey+'\','+p+',\''+selDate+'\');render()" '
              +'style="flex:1;padding:6px 2px;border-radius:8px;border:1.5px solid '+(on?col.bar:'#e2e8f0')+';background:'+(on?col.bg:'white')+';color:'+(on?col.text:'#94a3b8')+';font-size:13px;font-weight:'+(on?'800':'600')+';cursor:pointer;font-family:inherit">'+p+'%</button>';
          });
          panelH += '</div>'+(pct<30&&hw.stage!=='없음'?'<div style="margin-top:6px;font-size:11px;color:#dc2626;font-weight:700">⚠️ 미흡 (30% 미만)</div>':'')+'</div>';
        });
      } else {
        // 과제 없는 교재 — 기본 체크
        var hwB = dh[bk.id]||{stage:'없음',pct:0};

        panelH += '<div style="background:#f8fafc;border:1.5px solid #e8edf5;border-radius:12px;padding:12px;margin-bottom:10px">'
          +'<div style="font-size:13px;font-weight:800;color:#0d2240;margin-bottom:8px">'+bk.name+'</div>'
          +'<div style="display:flex;gap:4px;margin-bottom:6px">';
        HW_STAGES.forEach(sg=>{
          var on=hwB.stage===sg; var sc=HW_COLORS[sg];
          panelH+='<button onclick="saveHwStageKey(\''+stId+'\',\''+bk.id+'\',\''+sg+'\',\''+selDate+'\');render()" '
            +'style="flex:1;padding:7px 2px;border-radius:8px;border:1.5px solid '+(on?sc.bar:'#e2e8f0')+';background:'+(on?sc.bg:'white')+';color:'+(on?sc.text:'#94a3b8')+';font-size:11px;font-weight:'+(on?'800':'600')+';cursor:pointer;font-family:inherit;white-space:nowrap">'+sg+'</button>';
        });
        panelH += '</div><div style="display:flex;gap:4px">';

function rStudentTab_로드맵(name,grade,stInfo){
  if(!stInfo) return '<div style="padding:40px;text-align:center;color:#94a3b8">학생 정보 없음</div>';

  const stId = stInfo.id;
  const GRADES_LIST = ['초4','초5','초6','중1','중2','중3','고1','고2','고3'];
  const GRADE_COLORS = {
    '초4':'#84cc16','초5':'#22c55e','초6':'#10b981',
    '중1':'#3b82f6','중2':'#06b6d4','중3':'#0ea5e9',
    '고1':'#f59e0b','고2':'#ef4444','고3':'#8b5cf6'
  };
  const GRADE_LABELS = {
    '초4':'초등 4학년','초5':'초등 5학년','초6':'초등 6학년',
    '중1':'중학교 1학년','중2':'중학교 2학년','중3':'중학교 3학년',
    '고1':'고등학교 1학년','고2':'고등학교 2학년','고3':'고등학교 3학년'
  };

  // 기본 커리큘럼 템플릿
  const DEFAULT_CURRICULUM = {"중1": {"current": ["개념원리 중1", "RPM 중1"], "advanced": ["개념유형 중2"]}, "중2": {"current": ["개념원리 중2", "RPM 중2"], "advanced": ["개념유형 중3"]}, "중3": {"current": ["개념원리 중3", "쎈 중3"], "advanced": ["수학1 기본"]}, "고1": {"current": ["수학1", "수학2"], "advanced": ["미적분 기본"]}, "고2": {"current": ["미적분", "확률과통계"], "advanced": ["수능 대비"]}, "고3": {"current": ["수능 완성", "파이널"], "advanced": []}};

  // stInfo 로드맵 데이터 (없으면 기본값)
  if(!stInfo.lumen_roadmap) stInfo.lumen_roadmap = {};
  GRADES_LIST.forEach(g=>{
    if(!stInfo.lumen_roadmap[g]){
      stInfo.lumen_roadmap[g] = {
        current: [...(DEFAULT_CURRICULUM[g]?.current||[])],
        advanced: [...(DEFAULT_CURRICULUM[g]?.advanced||[])],
      };
    }
    if(!stInfo.lumen_roadmap[g].current) stInfo.lumen_roadmap[g].current=[];
    if(!stInfo.lumen_roadmap[g].advanced) stInfo.lumen_roadmap[g].advanced=[];
  });

  // 현재 선택된 학년 (전역 상태)
  if(typeof window.ROADMAP_GRADE === 'undefined') window.ROADMAP_GRADE = grade||'중1';
  // grade 문자열 정규화 (중학교1학년 → 중1)
  function normalizeGrade(g){
    if(!g) return '중1';
    if(g.includes('중학교')){const n=g.match(/\d/);return n?'중'+n[0]:'중1';}
    if(g.includes('고등학교')){const n=g.match(/\d/);return n?'고'+n[0]:'고1';}
    return g;
  }
  const currentGrade = normalizeGrade(grade);
  const selGrade = window.ROADMAP_GRADE;

  // ── 로드맵 저장 함수
  function saveRoadmapField(g, field, idx, val){
    const st=students.find(s=>s.id===stId);
    if(!st)return;
    if(!st.lumen_roadmap)st.lumen_roadmap={};
    if(!st.lumen_roadmap[g])st.lumen_roadmap[g]={current:[],advanced:[]};
    if(!st.lumen_roadmap[g][field])st.lumen_roadmap[g][field]=[];
    st.lumen_roadmap[g][field][idx]=val;
    saveStudents();
  }
  function addRoadmapBook(g, field){
    const st=students.find(s=>s.id===stId);
    if(!st)return;
    if(!st.lumen_roadmap)st.lumen_roadmap={};
    if(!st.lumen_roadmap[g])st.lumen_roadmap[g]={current:[],advanced:[]};
    if(!st.lumen_roadmap[g][field])st.lumen_roadmap[g][field]=[];
    st.lumen_roadmap[g][field].push('');
    saveStudents();render();
  }
  function removeRoadmapBook(g, field, idx){
    const st=students.find(s=>s.id===stId);
    if(!st)return;
    st.lumen_roadmap[g][field].splice(idx,1);
    saveStudents();render();
  }

  // ── 상단: 목표대학 + 타임라인
  var targetUniv = stInfo.lumen_targetUniversity||'';
  var targetMajor = stInfo.lumen_targetMajor||'';

  // 타임라인 HTML
  var timelineH = '<div style="display:flex;align-items:center;gap:0;padding:20px 24px;background:white;border-radius:16px;border:2px solid #e8edf5;margin-bottom:20px;overflow-x:auto">';
  GRADES_LIST.forEach(function(g,i){
    var col = GRADE_COLORS[g];
    var isCur = (g===currentGrade);
    var isSel = (g===selGrade);
    var rd = stInfo.lumen_roadmap[g]||{};

    // 노드

  timelineH += '<div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px #f59e0b66">🎓</div>';
  timelineH += '<div style="font-size:10px;font-weight:700;color:#f59e0b;text-align:center;max-width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(targetUniv||'목표대학')+'</div>';
  timelineH += '</div>';
  timelineH += '</div>';

  // ── 선택된 학년 상세 카드
  var rd = stInfo.lumen_roadmap[selGrade]||{current:[],advanced:[]};
  var col = GRADE_COLORS[selGrade];
  var isCurGrade = (selGrade===currentGrade);

  // 등록된 교재 목록 (교재관리에서)
  var bookOptions = books.map(b=>'<option value="'+b.name+'">'+b.name+'</option>').join('');

  var detailH = '<div style="background:white;border:2px solid '+col+'44;border-radius:16px;padding:20px">';
